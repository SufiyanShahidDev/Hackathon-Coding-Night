<!DOCTYPE html>
<html lang="en">
<head>
  <!-- FILE: notifications.html — Notifications Page -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelpHub AI – Notifications</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="hh-navbar">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between">
        <a href="index.html" class="navbar-brand">
          <span class="hh-logo-icon">H</span>
          HelpHub AI
        </a>
        <div class="d-none d-md-flex align-items-center gap-1">
          <a href="dashboard.html"     class="nav-link">Dashboard</a>
          <a href="explore.html"       class="nav-link">Explore</a>
          <a href="notifications.html" class="nav-link">Notifications</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===================== MAIN CONTENT ===================== -->
  <div class="container page-wrap">

    <!-- Hero -->
    <div class="hh-hero">
      <p class="breadcrumb-label">NOTIFICATIONS</p>
      <h1>Stay updated on requests, helpers, and trust signals.</h1>
    </div>

    <!-- Notifications card -->
    <div style="max-width:700px;">
      <div class="hh-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <p class="section-label">LIVE UPDATES</p>
            <h2>Notification feed</h2>
          </div>
          <button class="btn-sm-outline" onclick="markAllRead()">Mark all read</button>
        </div>

        <div id="notif-list">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>

  </div><!-- /container -->

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // ── Render notifications ────────────────────────────────
    function renderNotifications() {
      const list  = document.getElementById("notif-list");
      const notifs = getNotifications();
      list.innerHTML = "";

      if (notifs.length === 0) {
        list.innerHTML = `<p class="text-muted-sm">No notifications yet.</p>`;
        return;
      }

      notifs.forEach(n => {
        const div = document.createElement("div");
        div.className = "notif-item";
        div.innerHTML = `
          <div>
            <h6>${n.text}</h6>
            <p class="notif-meta">${n.type} &bull; ${n.time}</p>
          </div>
          <span class="notif-status ${n.read ? '' : 'unread'}" onclick="readNotif('${n.id}', this)">
            ${n.read ? 'Read' : 'Unread'}
          </span>
        `;
        list.appendChild(div);
      });
    }

    // ── Mark a single notification as read ──────────────────
    function readNotif(id, el) {
      markNotifRead(id);
      el.textContent = "Read";
      el.classList.remove("unread");
    }

    // ── Mark all notifications as read ──────────────────────
    function markAllRead() {
      const notifs = getNotifications();
      notifs.forEach(n => n.read = true);
      saveNotifications(notifs);
      renderNotifications();
    }

    // ── On page load ────────────────────────────────────────
    window.addEventListener("DOMContentLoaded", function () {
      renderNotifications();
    });
  </script>
</body>
</html>
