<!DOCTYPE html>
<html lang="en">
<head>
  <!-- FILE: messages.html — Interaction / Messaging Page -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelpHub AI – Messages</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="hh-navbar">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between">
        <a href="index.html" class="navbar-brand">
          <span class="hh-logo-icon">H</span>
          HelpHub AI
        </a>
        <div class="d-none d-md-flex align-items-center gap-1">
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="explore.html"   class="nav-link">Explore</a>
          <a href="messages.html"  class="nav-link">Messages</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===================== MAIN CONTENT ===================== -->
  <div class="container page-wrap">

    <!-- Hero -->
    <div class="hh-hero">
      <p class="breadcrumb-label">INTERACTION / MESSAGING</p>
      <h1>Keep support moving through direct communication.</h1>
      <p>Basic messaging gives helpers and requesters a clear follow-up path once a match happens.</p>
    </div>

    <div class="row g-4">

      <!-- Left: Conversation stream -->
      <div class="col-lg-7">
        <div class="hh-card">
          <p class="hh-card-title">CONVERSATION STREAM</p>
          <h2>Recent messages</h2>

          <div id="message-stream">
            <!-- Filled by JS -->
          </div>
        </div>
      </div>

      <!-- Right: Send message form -->
      <div class="col-lg-5">
        <div class="hh-card">
          <p class="hh-card-title">SEND MESSAGE</p>
          <h2>Start a conversation</h2>

          <div class="mb-3">
            <label class="hh-label">To</label>
            <select class="hh-form-control" id="msg-to">
              <option value="Ayesha Khan">Ayesha Khan</option>
              <option value="Hassan Ali">Hassan Ali</option>
              <option value="Sara Noor">Sara Noor</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="hh-label">Message</label>
            <textarea class="hh-form-control" id="msg-text" rows="5"
                      placeholder="Share support details, ask for files, or suggest next steps."
                      style="resize:vertical;"></textarea>
          </div>

          <button class="btn-teal btn-teal-wide" onclick="sendMessage()">Send</button>

          <p id="send-feedback" class="d-none text-muted-sm mt-2 text-center" style="font-size:0.82rem;"></p>
        </div>
      </div>

    </div>
  </div><!-- /container -->

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // ── Render messages ─────────────────────────────────────
    function renderMessages() {
      const stream   = document.getElementById("message-stream");
      const messages = getMessages();
      stream.innerHTML = "";

      messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message-thread d-flex justify-content-between align-items-start gap-2";
        div.innerHTML = `
          <div>
            <h6>${msg.from} → ${msg.to}</h6>
            <p>${msg.text}</p>
          </div>
          <span class="message-time">${msg.time}</span>
        `;
        stream.appendChild(div);
      });

      if (messages.length === 0) {
        stream.innerHTML = `<p class="text-muted-sm">No messages yet. Start a conversation!</p>`;
      }
    }

    // ── Send a message ──────────────────────────────────────
    function sendMessage() {
      const to   = document.getElementById("msg-to").value;
      const text = document.getElementById("msg-text").value.trim();

      if (!text) { alert("Please write a message first."); return; }

      const user = getLoggedInUser();
      const from = user ? user.name : "You";

      // Build time string
      const now  = new Date();
      const time = now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });

      addMessage({ from, to, text, time });

      // Clear textarea & show feedback
      document.getElementById("msg-text").value = "";
      const fb = document.getElementById("send-feedback");
      fb.textContent = "✅ Message sent!";
      fb.classList.remove("d-none");
      setTimeout(() => fb.classList.add("d-none"), 3000);

      // Re-render
      renderMessages();
    }

    // ── On page load ────────────────────────────────────────
    window.addEventListener("DOMContentLoaded", function () {
      renderMessages();

      // Pre-select recipient if logged in
      const user = getLoggedInUser();
      if (user) {
        const sel = document.getElementById("msg-to");
        // Pick someone who isn't the logged-in user
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value !== user.name) {
            sel.selectedIndex = i;
            break;
          }
        }
      }
    });
  </script>
</body>
</html>
